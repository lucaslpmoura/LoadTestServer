<h1>
    Servidor de teste de carga.
</h1>
<h3>
    Rotas disponíveis:
</h3>
<ul>
    <li><a href="/5kB">/5kB</a> - retorna uma página HTML de 5 kB de tamanho.</li>
    <li><a href="/50kB">/50kB</a>  - retorna uma página HTML de 50 kB de tamanho.</li>
    <li><a href="/500kB">/500kB</a>  - retorna uma página HTML de 500 kB de tamanho.</li>
    <li><a href="/stats">/stats</a>  - estatísticas do teste.</li>
    <li><a href="/clear">/clear</a>  - limpa todos os contadores.</li>
</ul>
